{% extends "base.html" %}

{% block title %}{{ t.item_system_settings }}{% endblock %}

{% block content %}
<div class="settings-container">
    <h1>{{ t.heading_system_settings }}</h1>
    
    <form action="/settings/system" method="post">
        <!-- Log Settings -->
        <div class="settings-section">
            <h2 style="margin-bottom: 25px;">Logging</h2>
            
            <div style="display: flex; flex-direction: column; gap: 40px;">
                <!-- Application Log Sub-section -->
                <div class="log-sub-section">
                    <h3 style="margin: 0 0 15px 0; border-bottom: 2px solid #000; padding-bottom: 5px; display: inline-block;">{{ t.heading_app_log }}</h3>
                    <div style="display: flex; flex-direction: column; gap: 15px; margin-top: 10px;">
                        <div>
                            <label for="app_log_lines" style="display: block; font-weight: bold; margin-bottom: 5px;">{{ t.label_log_lines }}</label>
                            <input type="number" id="app_log_lines" name="app_log_lines" value="{{ app_log_lines }}" style="width: 100px;">
                        </div>
                        <div>
                            <label for="app_log_retention" style="display: block; font-weight: bold; margin-bottom: 5px;">{{ t.label_log_retention }}</label>
                            <input type="number" id="app_log_retention" name="app_log_retention" value="{{ app_log_retention }}" min="1" max="31" style="width: 100px;">
                        </div>
                    </div>
                </div>

                <!-- Startup Log Sub-section -->
                <div class="log-sub-section">
                    <h3 style="margin: 0 0 15px 0; border-bottom: 2px solid #000; padding-bottom: 5px; display: inline-block;">{{ t.heading_startup_log }}</h3>
                    <div style="display: flex; flex-direction: column; gap: 15px; margin-top: 10px;">
                        <div>
                            <label for="startup_log_lines" style="display: block; font-weight: bold; margin-bottom: 5px;">{{ t.label_log_lines }}</label>
                            <input type="number" id="startup_log_lines" name="startup_log_lines" value="{{ startup_log_lines }}" style="width: 100px;">
                        </div>
                        <div>
                            <label for="startup_log_retention" style="display: block; font-weight: bold; margin-bottom: 5px;">{{ t.label_log_retention }}</label>
                            <input type="number" id="startup_log_retention" name="startup_log_retention" value="{{ startup_log_retention }}" min="1" max="31" style="width: 100px;">
                        </div>
                    </div>
                </div>

                <!-- Unit Test Log Sub-section -->
                <div class="log-sub-section">
                    <h3 style="margin: 0 0 15px 0; border-bottom: 2px solid #000; padding-bottom: 5px; display: inline-block;">{{ t.heading_test_log }}</h3>
                    <div style="display: flex; flex-direction: column; gap: 15px; margin-top: 10px;">
                        <div>
                            <label for="test_log_lines" style="display: block; font-weight: bold; margin-bottom: 5px;">{{ t.label_log_lines }}</label>
                            <input type="number" id="test_log_lines" name="test_log_lines" value="{{ test_log_lines }}" style="width: 100px;">
                        </div>
                        <div>
                            <label for="test_log_retention" style="display: block; font-weight: bold; margin-bottom: 5px;">{{ t.label_log_retention }}</label>
                            <input type="number" id="test_log_retention" name="test_log_retention" value="{{ test_log_retention }}" min="1" max="31" style="width: 100px;">
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <button type="submit" class="btn-save-settings">{{ t.btn_save_settings }}</button>
    </form>
</div>

<script>
</script>
{% endblock %}
