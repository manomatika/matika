<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="/static/css/style.css">
    <title>{% block title %}{{ t.title }}{% endblock %}</title>
    <meta name="csrf-token" content="{{ csrf_token | default('') }}">
    <meta name="user-id" content="{{ user_id | default('') }}">
    <meta name="user-default-menu" content="{{ user_default_menu | default('') }}">
    <style>
        /* User-zone dropdown separator (inline to avoid coupling to hub styles) */
        .menu-zone-user .dropdown div.menu-separator {
            padding: 0;
            height: 1px;
            background-color: #ddd;
            margin: 5px 0;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="menu-bar">

        <!-- Zone 1: Logo -->
        <a href="/" class="menu-zone-logo" aria-label="{{ t.item_home or 'Home' }}">
            <img src="/static/img/matika_icon_32.png"
                 srcset="/static/img/matika_icon_32.png 1x, /static/img/matika_icon_64.png 2x"
                 alt="Matika"
                 class="logo-img"
                 width="32" height="32">
        </a>

        <!-- Zone 2: Menu Hub (selector + active items, populated by main.js) -->
        <div class="menu-zone-hub" id="menu-zone-hub">
            <div class="menu-selector" id="menu-selector">
                <button class="menu-selector-trigger" id="menu-selector-trigger"
                        type="button" aria-haspopup="listbox" aria-expanded="false"></button>
                <div class="menu-selector-panel" id="menu-selector-panel">
                    <div class="menu-selector-list" id="menu-selector-list" role="listbox"></div>
                </div>
            </div>
            <div class="menu-hub-items" id="menu-hub-items"></div>
        </div>

        <!-- Zone 3: User (hover-based dropdown, unchanged) -->
        <div class="menu-zone-user">
            {% if user %}
                <span class="logged-in-label">{{ t.msg_logged_in_as }} {{ user.email }}</span>
                <div class="menu-item" style="padding: 0;">
                    {% if user.photo_url %}
                        <img src="{{ user.photo_url }}" class="user-photo" alt="User Photo">
                    {% else %}
                        <div class="user-photo" style="display:flex;align-items:center;justify-content:center;font-size:10px;color:#666;">
                            {{ user.username[:2].upper() }}
                        </div>
                    {% endif %}
                    <div class="dropdown" style="left:auto;right:0;">
                        <div data-href="/settings/user">{{ t.item_user_settings }}</div>
                        <div class="menu-separator"></div>
                        <div data-href="/settings/export">{{ t.link_export_data }}</div>
                        <div data-href="/settings/import">{{ t.link_import_data }}</div>
                        <div class="menu-separator"></div>
                        <div data-href="/logout">{{ t.nav_logout }}</div>
                    </div>
                </div>
            {% endif %}
        </div>

    </div>

    <div class="content">
        {% block content %}{% endblock %}
    </div>

    <script type="application/json" id="matika-menus">{{ menus_data | tojson }}</script>
    <script src="/static/js/main.js" type="module"></script>
</body>
</html>
