name: Check compiled assets

on:
  pull_request:
  push:
    branches: [main]

jobs:
  check-compiled-assets:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build TypeScript
        run: npm run build

      - name: Fail if compiled assets are stale
        run: |
          if ! git diff --quiet src/matika/static/js/; then
            echo "Compiled assets are stale. Run 'npm run build' and commit the output."
            git diff --name-only src/matika/static/js/
            exit 1
          fi
